name: Generate design review index

# Regenerates designs/posts/index.json from design-review frontmatter after
# design docs land on main. Design reviews do not currently generate OG cards;
# the manifest is the only derived artifact.

on:
  push:
    branches: [main]
    paths:
      - 'designs/posts/*.md'
      - 'scripts/generate_design_index.py'
      - '.github/workflows/generate-designs.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: designs-main-push
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate design review index
        run: python3 scripts/generate_design_index.py

      - name: Commit design review index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add designs/posts/index.json
          if git diff --cached --quiet; then
            echo "Nothing to update."
          else
            git commit -m "chore: regenerate design review index"
            git pull --rebase origin main
            git push origin HEAD:main
          fi
